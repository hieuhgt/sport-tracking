events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS resolver — forces re-resolution on each request
    # so nginx picks up scaled consumer replicas automatically
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream frontend_upstream {
        server frontend:80;
    }

    upstream producer_upstream {
        server producer:3001;
    }

    # ip_hash ensures the same client always hits the same consumer replica
    # (required for Socket.io long-polling fallback)
    upstream consumer_upstream {
        ip_hash;
        server consumer:3002;
    }

    server {
        listen 80;
        server_name _;

        # Frontend SPA
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Producer REST API
        location /api/ {
            proxy_pass http://producer_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Socket.io — requires WebSocket upgrade headers
        location /socket.io/ {
            proxy_pass http://consumer_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
